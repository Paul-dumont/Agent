  - name: mri2cbct_orient_center
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/MRI2CBCT_ORIENT_CENTER_MRI.py
    description: "Orient and center MRI scans for standardized positioning. Automatically reorients and centers MRI volumes to a canonical anatomical frame of reference for standardized analysis and comparison across subjects."
    tags: [mri, orientation, centering, registration, standardization, preprocessing, alignment, anatomical]
    priority: 17

    cli_style: positional
    parameters:
      - name: input_folder
        type: path
        required: true
