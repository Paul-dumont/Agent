  - name: pre_aso_ios
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/PRE_ASO_IOS.py
    description: "Preprocessing for Automatic Segmentation Orientation - IOS. Orients and preprocesses intraoral scan surfaces for standardized coordinate frames and tooth-specific segmentation and analysis."
