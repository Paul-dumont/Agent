    parameters:
      - name: notes_folder
        type: path
        required: true
        description: "Folder containing patient notes (PDF/DOCX/TXT)."

      - name: output_folder
        type: path
        required: true
        description: "Output folder for summaries."

      - name: model_name
        type: str
        default: "t5-base"
        description: "Huggingface model for summarization."

      - name: log_path
        type: path
        required: true
        description: "Log file path."

  - name: mri2cbct_approx
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/MRI2CBCT_APPROX.py
    description: "MRI to CBCT approximation and preprocessing for multimodal registration. Preprocesses MRI and CBCT scans with intensity normalization and spatial reorientation for subsequent multimodal registration and fusion."
