    description: "Resample MRI and CBCT to uniform spacing. Interpolates medical images to isotropic or anisotropic target resolution for standardized processing and compatibility with subsequent deep learning or analysis pipelines."
    tags: [mri, cbct, resample, spacing, interpolation, preprocessing, voxel, standardization]
