defaults:
  threshold: 0.45
  topk: 3

scripts:
  - name: ali_cbct
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/ALI_CBCT.py
    description: "Automated Anatomic Landmarks Identification on CBCT scans using AI agents. Detects anatomical reference points on cone-beam CT volumes for precise dental and maxillofacial measurements and analysis."
    tags: [cbct, landmarks, ali, segmentation, dicom, nifti, agent, ai, anatomy, dental, maxillofacial, detection]
    priority: 10

    cli_style: positional
    positional_order:
      - input
      - dir_models
      - lm_type
      - output_dir
      - temp_fold
      - DCMInput
      - spacing
      - speed_per_scale
      - agent_FOV
      - spawn_radius

    parameters:
      - name: input
        type: path
        required: true
        description: "CBCT files (.nii/.nrrd/...) or folder containing the scans."

      - name: dir_models
        type: path
        required: true
        description: "Model folder used by ALI."

      - name: lm_type
        type: list
        required: true
        encode: comma_no_brackets
        description: "List of landmark types to detect, separated by comma (no brackets)."

      - name: output_dir
        type: path
        required: true
        description: "Output folder where landmarks are saved"

      - name: temp_fold
        type: path
        required: true
        description: "Temporary folder for intermediary histogram/spacing"

      - name: DCMInput
        type: bool
        default: false
        encode: lower_str_bool
        description: "Whether input is DICOM format (true) or not (false)"

      - name: spacing
        type: list[float]
        default: [1.0, 0.3]
        encode: python_literal
        description: "List of spacing (mm) to use, ex. [1,0.3]."

      - name: speed_per_scale
        type: list[float]
        default: [1, 1]
        encode: python_literal
        description: "Speed per scale of the agent, ex. [1,1]."

      - name: agent_FOV
        type: list[int]
        default: [64, 64, 64]
        encode: python_literal
        description: "Field of View of the agent (voxels), ex. [64,64,64]."

      - name: spawn_radius
        type: int
        default: 10
        description: "Spawn radius of the agent (voxels)."

    examples:
      - 'ali cbct on a .nii : "./ALI_CBCT.nii.gz" "models/" "1,2,3" "./out" "./tmp" false "[1,0.3]" "[1,1]" "[64,64,64]" 10'
      - 'ali cbct on DICOM folder : "./patient01_dcm/" "models/" "LM1,LM2" "./out" "./tmp" true "[0.6,0.3]" "[1,1]" "[64,64,64]" 10'

  - name: ali_ios
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/ALI_IOS.py
    description: "Automatic Landmark Identification in Intraoral Scans (IOS). Detects dental and anatomical landmarks on 3D surface meshes from intraoral scanners for orthodontic and prosthodontic analysis."
    tags: [ios, landmarks, ali, segmentation, surface, mesh, dental, intraoral, 3d, detection, anatomy]
    priority: 9

    cli_style: positional
    parameters:
      - name: input_surface
        type: path
        required: true
        description: "Input intraoral scan surface file (STL/VTK/OFF)."

      - name: dir_models
        type: path
        required: true
        description: "Folder containing the pre-trained landmark detection models."

      - name: lm_type
        type: list
        required: true
        encode: space_separated
        description: "Types of landmarks to detect (space separated)."

      - name: teeth
        type: list
        required: true
        encode: space_separated
        description: "Teeth to process (space separated)."

      - name: output_dir
        type: path
        required: true
        description: "Output folder for landmarks and results."

      - name: log_path
        type: path
        required: true
        description: "Path to log file for progress tracking."

  - name: amasss_cli
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/AMASSS_CLI.py
    description: "AMASSS - Anatomical Structures Segmentation from CBCT using deep learning. Automatic segmentation of maxilla, mandible, and other anatomical structures using nnUNet-based models trained on dental CBCT data."
    tags: [cbct, segmentation, nnunet, anatomical, mandible, maxilla, jaw, dental, anatomy, deep-learning, ai]
    priority: 8

    cli_style: positional
    parameters:
      - name: input_folder
        type: path
        required: true
        description: "Folder containing CBCT scans to segment."

      - name: output_folder
        type: path
        required: true
        description: "Output folder for segmented structures."

      - name: models_folder
        type: path
        required: true
        description: "Folder containing nnUNet model checkpoints."

      - name: model_size
        type: str
        default: "LARGE"
        description: "Model size: LARGE (full anatomy) or SMALL (detailed structures)."

      - name: log_path
        type: path
        required: true
        description: "Path to log file."

  - name: areg_cbct
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/AREG_CBCT.py
    description: "Automatic Registration of CBCT images for longitudinal studies. Registers baseline and follow-up CBCT scans using deformable or rigid registration to track anatomical changes over time."
    tags: [cbct, registration, voxel, transformation, dicom, longitudinal, deformable, rigid, alignment]
    priority: 7

    cli_style: positional
    parameters:
      - name: t1_folder
        type: path
        required: true
        description: "Folder containing baseline (T1) CBCT scans."

      - name: t2_folder
        type: path
        required: true
        description: "Folder containing follow-up (T2) CBCT scans."

      - name: reg_type
        type: str
        required: true
        description: "Registration type (e.g., MAND, MAX, CB)."

      - name: output_folder
        type: path
        required: true
        description: "Output folder for registered images and transforms."

      - name: add_name
        type: str
        default: ""
        description: "Additional suffix for output files."

      - name: DCMInput
        type: bool
        default: false
        encode: lower_str_bool
        description: "Whether input is DICOM format."

      - name: SegmentationLabel
        type: int
        default: 0
        description: "Segmentation label to use for registration (0 = none)."

      - name: temp_folder
        type: path
        required: true
        description: "Temporary folder for intermediate files."

      - name: ApproxReg
        type: bool
        default: false
        encode: lower_str_bool
        description: "Use approximation-based registration."

      - name: mask_folder_t1
        type: path
        default: "None"
        description: "Optional mask folder for T1 segmentation."

  - name: areg_ios
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/AREG_IOS.py
    description: "Automatic Registration of Intraoral Scans using Iterative Closest Point (ICP). Registers baseline and follow-up IOS surfaces for longitudinal dental tracking and treatment outcome assessment."
    tags: [ios, registration, icp, surface, transformation, mesh, longitudinal, alignment, dental]
    priority: 6

    cli_style: positional
    parameters:
      - name: T1
        type: path
        required: true
        description: "Folder containing baseline (T1) intraoral scan surfaces."

      - name: T2
        type: path
        required: true
        description: "Folder containing follow-up (T2) intraoral scan surfaces."

      - name: model
        type: path
        required: true
        description: "Path to segmentation refinement model."

      - name: output
        type: path
        required: true
        description: "Output folder for registered surfaces."

      - name: suffix
        type: str
        default: "_reg"
        description: "Suffix for output files."

      - name: areg_mode
        type: str
        default: "Auto_IOS"
        description: "Registration mode (e.g., Auto_IOS)."

      - name: log_path
        type: path
        required: true
        description: "Log file path."

  - name: autocrop3d
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/AutoCrop3D_CLI.py
    description: "Automatic 3D region cropping using ROI markers. Extracts and crops regions of interest from 3D volumetric medical images (CT, MRI, CBCT) using point-based or region markers for focused analysis."
    tags: [crop, roi, volume, marker, nifti, nrrd, cbct, mri, ct, extraction, region]
    priority: 5

    cli_style: positional
    parameters:
      - name: scan_files_path
        type: path
        required: true
        description: "Folder containing scan files (.nii, .nrrd, etc.)."

      - name: path_ROI_file
        type: path
        required: true
        description: "Path to ROI marker file (.mrk.json) or folder."

      - name: output_path
        type: path
        required: true
        description: "Output folder for cropped volumes."

      - name: suffix
        type: str
        default: "_crop"
        description: "Suffix for output files."

      - name: box_Size
        type: list[float]
        default: [50, 50, 50]
        encode: python_literal
        description: "ROI box size in physical coordinates."

      - name: logPath
        type: path
        required: true
        description: "Progress log file path."

  - name: automatrix
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/Automatrix_CLI.py
    description: "Automatic transformation matrix application to scans and surfaces. Applies pre-computed transformation matrices (rigid, affine, or deformable) to medical images and 3D surface meshes for standardized registration."
    tags: [transformation, matrix, deformation, registration, alignment, affine, rigid, warping]
    priority: 4

    cli_style: positional
    parameters:
      - name: file_path
        type: path
        required: true
        description: "Input scan or surface file/folder."

      - name: matrix_path
        type: path
        required: true
        description: "Folder containing transformation matrices (.tfm, .h5)."

      - name: output_folder
        type: path
        required: true
        description: "Output folder for transformed files."

      - name: add_name
        type: str
        default: "_transformed"
        description: "Suffix for output files."

  - name: batchdentalseg
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/BATCHDENTALSEG.py
    description: "Batch Dental Segmentation using nnUNet in 3D Slicer. Automated segmentation of dental structures (teeth, bone, soft tissue) from CBCT scans using pre-trained nnUNet deep learning models with batch processing support."
    tags: [dental, segmentation, nnunet, cbct, slicer, teeth, bone, deep-learning, batch, plugin]
    priority: 3

    cli_style: ui_module
    parameters:
      - name: input_folder
        type: path
        required: true
        description: "Folder containing dental CBCT scans."

      - name: output_folder
        type: path
        required: true
        description: "Output folder for segmented dental structures."

      - name: models_folder
        type: path
        required: true
        description: "Folder containing nnUNet model weights."

      - name: log_path
        type: path
        required: true
        description: "Progress log file."

  - name: clic
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/CLIC.py
    description: "CLIC - Mask-RCNN CBCT segmentation (GPU/CPU) integrated in 3D Slicer. Instance segmentation of dental and anatomical structures from CBCT using Mask R-CNN with GPU acceleration support for real-time performance."
    tags: [cbct, segmentation, mask-rcnn, slicer, gpu, deep-learning, instance-segmentation, dental, gpu-acceleration]
    priority: 2

    cli_style: ui_module
    parameters:
      - name: input_folder
        type: path
        required: true
        description: "Folder containing CBCT scans."

      - name: output_folder
        type: path
        required: true
        description: "Output folder for segmentations."

      - name: model_folder
        type: path
        required: true
        description: "Folder containing Mask-RCNN model."

      - name: use_gpu
        type: bool
        default: true
        description: "Use GPU acceleration if available."

  - name: docshapeaxi
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/DOCShapeAXI_CLI.py
    description: "Shape Analysis of dental surfaces using ShapeAXI. Statistical shape analysis and classification of 3D dental meshes with GradCAM visualization for interpretability and morphometric feature extraction."
    tags: [shape, analysis, surface, gradcam, classification, mesh, 3d, morphometry, dental, interpretability]
    priority: 1

    cli_style: positional
    parameters:
      - name: input_surfaces
        type: path
        required: true
        description: "Folder containing surface meshes (.vtk, .stl, .off)."

      - name: model_path
        type: path
        required: true
        description: "Path to trained ShapeAXI model."

      - name: output_folder
        type: path
        required: true
        description: "Output folder for analysis results."

      - name: compute_gradcam
        type: bool
        default: false
        description: "Compute and save GradCAM attention maps."

  - name: flexreg
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/FlexReg_CLI.py
    description: "Flexible Patch-based Registration for dental surfaces. Registers 3D dental surface meshes using patch-based deformable registration with butterfly and curve patch methods for precision tooth movement tracking."
    tags: [registration, surface, patch, deformation, mesh, dental, 3d, deformable, alignment, tooth]
    priority: 11

    cli_style: positional
    parameters:
      - name: input_surface
        type: path
        required: true
        description: "Input surface file."

      - name: patch_type
        type: str
        required: true
        description: "Type of patch: butterfly, curve, or delete."

      - name: output_folder
        type: path
        required: true
        description: "Output folder for deformed surfaces."

  - name: medx_dashboard
    path: /home/luciacev/Documents/AlexCodes/Agent/CLI files/MedX_Dashboard.py
    description: "MedX Dashboard - Interactive visualization of medical data and analysis summaries. Generates HTML dashboards for visual exploration of clinical outcomes, measurements, and longitudinal study results."
    tags: [dashboard, visualization, medx, summarization, html, clinical, web, reporting, analytics]
    priority: 12

    cli_style: positional
    parameters:
      - name: summary_folder
        type: path
        required: true
        description: "Folder containing summary files."

      - name: output_folder
        type: path
        required: true
